apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: zenalpha
  labels:
    app: gateway
data:
  application.yml: |
    server:
      port: 8080
    spring:
      cloud:
        gateway:
          routes:
            - id: signal-service
              uri: lb://signal-service
              predicates:
                - Path=/api/signals/**
            - id: backtest-service
              uri: lb://backtest-service
              predicates:
                - Path=/api/backtest/**
            - id: data-service
              uri: lb://data-service
              predicates:
                - Path=/api/data/**
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**,/api/auth/**
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**
            - id: agent-service
              uri: http://agent-service.zenalpha.svc.cluster.local:8090
              predicates:
                - Path=/api/agents/**
              filters:
                - StripPrefix=2
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
    eureka:
      client:
        serviceUrl:
          defaultZone: http://eureka-server.zenalpha.svc.cluster.local:8761/eureka/
