apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-service
  namespace: zenalpha
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::110299474182:role/zenalpha-agent-timestream
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: zenalpha
  labels:
    app: agent-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      serviceAccountName: agent-service
      containers:
        - name: agent-service
          image: 110299474182.dkr.ecr.us-west-2.amazonaws.com/zenalpha/agent-service:latest
          ports:
            - containerPort: 8090
              name: http
          env:
            - name: AWS_DEFAULT_REGION
              value: us-west-2
            - name: INFLUXDB_URL
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: influxdb-url
                  optional: true
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: influxdb-token
                  optional: true
            - name: POLYGON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: polygon-secret
                  key: api-key
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: zenalpha
  labels:
    app: agent-service
spec:
  selector:
    app: agent-service
  ports:
    - name: http
      port: 8090
      targetPort: 8090
