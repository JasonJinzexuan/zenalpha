apiVersion: batch/v1
kind: CronJob
metadata:
  name: daily-ingest
  namespace: zenalpha
spec:
  # Run at 01:00 UTC daily (after US market close + buffer)
  schedule: "0 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: ingest
              image: curlimages/curl:8.5.0
              command:
                - /bin/sh
                - -c
                - |
                  AGENT=http://agent-service.zenalpha.svc.cluster.local:8090

                  echo "=== Daily Bulk Ingest $(date -u) ==="
                  echo "Ingesting all timeframes (5m, 30m, 1h, 1d, 1w) for all instruments..."

                  # Bulk ingest — per-TF limits for sufficient Chan Theory structure
                  # 5m/30m need 2000-3000 bars, 1d/1w need 500
                  # Rate limited internally at ~4 req/sec
                  for TF_CFG in "1w:500" "1d:500" "1h:2000" "30m:2000" "5m:3000"; do
                    TF="${TF_CFG%%:*}"
                    LIM="${TF_CFG##*:}"
                    echo "--- Ingesting $TF (limit=$LIM) ---"
                    curl -sf -X POST "$AGENT/ingest/bulk" \
                      -H 'Content-Type: application/json' \
                      -d "{
                        \"instruments\": [\"AAPL\",\"MSFT\",\"GOOGL\",\"AMZN\",\"NVDA\",\"META\",\"TSLA\",\"JPM\",\"V\",\"UNH\",\"XOM\",\"JNJ\",\"WMT\",\"PG\",\"MA\",\"HD\",\"COST\",\"ABBV\",\"CRM\"],
                        \"levels\": [\"$TF\"],
                        \"limit\": $LIM
                      }" \
                      --max-time 600 || echo "WARN: $TF ingest failed"
                  done

                  echo ""
                  echo "=== Signal Scan ==="
                  curl -sf -X POST "$AGENT/scan" \
                    -H 'Content-Type: application/json' \
                    -d '{"instruments":["AAPL","MSFT","GOOGL","AMZN","NVDA","META","UNH","TSLA","JPM","V"],"level":"1d","limit":500}' \
                    --max-time 60 | head -c 500 || echo "WARN: scan failed"

                  echo ""
                  echo "=== Done ==="
