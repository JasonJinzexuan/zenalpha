apiVersion: apps/v1
kind: Deployment
metadata:
  name: apollo-portal
  namespace: zenalpha
  labels:
    app: apollo-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apollo-portal
  template:
    metadata:
      labels:
        app: apollo-portal
    spec:
      containers:
        - name: apollo-portal
          image: apolloconfig/apollo-portal:2.1.0
          ports:
            - containerPort: 8070
              name: http
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: zenalpha-db-secret
                  key: host
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://$(DB_HOST):3306/ApolloPortalDB?useSSL=false&characterEncoding=utf8
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: zenalpha-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenalpha-db-secret
                  key: password
            - name: APOLLO_PORTAL_ENVS
              value: pro
            - name: PRO_META
              value: http://apollo-configservice.zenalpha.svc.cluster.local:8080
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8070
            initialDelaySeconds: 120
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8070
            initialDelaySeconds: 60
            periodSeconds: 10
