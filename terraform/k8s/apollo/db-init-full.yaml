###############################################################################
# Apollo Full Database & Config Initialization Job
#
# Idempotent: safe to run multiple times.
# Creates databases, imports schemas, seeds initial configurations.
#
# Usage:
#   kubectl delete job apollo-db-init-full -n zenalpha --ignore-not-found
#   kubectl apply -f db-init-full.yaml
###############################################################################
apiVersion: batch/v1
kind: Job
metadata:
  name: apollo-db-init-full
  namespace: zenalpha
  labels:
    app: apollo
    component: db-init
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: apollo
        component: db-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: mysql:8.0
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== Phase 1: Create databases ==="
              mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASS" <<'SQL'
              CREATE DATABASE IF NOT EXISTS ApolloConfigDB DEFAULT CHARACTER SET utf8mb4;
              CREATE DATABASE IF NOT EXISTS ApolloPortalDB DEFAULT CHARACTER SET utf8mb4;
              SQL
              echo "Databases ready."

              echo "=== Phase 2: Import ConfigDB schema ==="
              mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASS" ApolloConfigDB <<'SQL'
              CREATE TABLE IF NOT EXISTS `App` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `AppId` varchar(500) NOT NULL DEFAULT 'default',
                `Name` varchar(500) NOT NULL DEFAULT 'default',
                `OrgId` varchar(32) NOT NULL DEFAULT 'default',
                `OrgName` varchar(64) NOT NULL DEFAULT 'default',
                `OwnerName` varchar(500) NOT NULL DEFAULT 'default',
                `OwnerEmail` varchar(500) NOT NULL DEFAULT 'default',
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `AppId` (`AppId`(191)),
                KEY `DataChange_LastTime` (`DataChange_LastTime`),
                KEY `IX_Name` (`Name`(191))
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `AppNamespace` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `Name` varchar(32) NOT NULL DEFAULT '',
                `AppId` varchar(64) NOT NULL DEFAULT '',
                `Format` varchar(32) NOT NULL DEFAULT 'properties',
                `IsPublic` bit(1) NOT NULL DEFAULT b'0',
                `Comment` varchar(64) NOT NULL DEFAULT '',
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `IX_AppId` (`AppId`),
                KEY `Name_AppId` (`Name`,`AppId`),
                KEY `DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `Audit` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `EntityName` varchar(50) NOT NULL DEFAULT 'default',
                `EntityId` int unsigned DEFAULT NULL,
                `OpName` varchar(50) NOT NULL DEFAULT 'default',
                `Comment` varchar(500) DEFAULT NULL,
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `Cluster` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `Name` varchar(32) NOT NULL DEFAULT '',
                `AppId` varchar(64) NOT NULL DEFAULT '',
                `ParentClusterId` int unsigned NOT NULL DEFAULT 0,
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `IX_AppId_Name` (`AppId`,`Name`),
                KEY `IX_ParentClusterId` (`ParentClusterId`),
                KEY `DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `Commit` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `ChangeSets` longtext NOT NULL,
                `AppId` varchar(500) NOT NULL DEFAULT 'default',
                `ClusterName` varchar(500) NOT NULL DEFAULT 'default',
                `NamespaceName` varchar(500) NOT NULL DEFAULT 'default',
                `Comment` varchar(500) DEFAULT NULL,
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `DataChange_LastTime` (`DataChange_LastTime`),
                KEY `AppId` (`AppId`(191)),
                KEY `ClusterName` (`ClusterName`(191)),
                KEY `NamespaceName` (`NamespaceName`(191))
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `GrayReleaseRule` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `AppId` varchar(64) NOT NULL DEFAULT 'default',
                `ClusterName` varchar(32) NOT NULL DEFAULT 'default',
                `NamespaceName` varchar(32) NOT NULL DEFAULT 'default',
                `BranchName` varchar(32) NOT NULL DEFAULT 'default',
                `Rules` varchar(16000) DEFAULT '[]',
                `ReleaseId` int unsigned NOT NULL DEFAULT 0,
                `BranchStatus` tinyint DEFAULT 1,
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `DataChange_LastTime` (`DataChange_LastTime`),
                KEY `IX_Namespace` (`AppId`,`ClusterName`,`NamespaceName`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `Instance` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `AppId` varchar(64) NOT NULL DEFAULT 'default',
                `ClusterName` varchar(32) NOT NULL DEFAULT 'default',
                `DataCenter` varchar(64) NOT NULL DEFAULT 'default',
                `Ip` varchar(32) NOT NULL DEFAULT '',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                UNIQUE KEY `IX_UNIQUE_KEY` (`AppId`,`ClusterName`,`Ip`,`DataCenter`),
                KEY `IX_IP` (`Ip`),
                KEY `IX_DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `InstanceConfig` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `InstanceId` int unsigned DEFAULT NULL,
                `ConfigAppId` varchar(64) NOT NULL DEFAULT 'default',
                `ConfigClusterName` varchar(32) NOT NULL DEFAULT 'default',
                `ConfigNamespaceName` varchar(32) NOT NULL DEFAULT 'default',
                `ReleaseKey` varchar(64) NOT NULL DEFAULT '',
                `ReleaseDeliveryTime` timestamp NULL DEFAULT NULL,
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                UNIQUE KEY `IX_UNIQUE_KEY` (`InstanceId`,`ConfigAppId`,`ConfigNamespaceName`),
                KEY `IX_ReleaseKey` (`ReleaseKey`),
                KEY `IX_DataChange_LastTime` (`DataChange_LastTime`),
                KEY `IX_Valid_Namespace` (`ConfigAppId`,`ConfigClusterName`,`ConfigNamespaceName`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `Item` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `NamespaceId` int unsigned NOT NULL DEFAULT 0,
                `Key` varchar(128) NOT NULL DEFAULT 'default',
                `Type` tinyint NOT NULL DEFAULT 0,
                `Value` longtext NOT NULL,
                `Comment` varchar(1024) DEFAULT '',
                `LineNum` int unsigned DEFAULT 0,
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `IX_GroupId` (`NamespaceId`),
                KEY `DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `Namespace` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `AppId` varchar(500) NOT NULL DEFAULT 'default',
                `ClusterName` varchar(500) NOT NULL DEFAULT 'default',
                `NamespaceName` varchar(500) NOT NULL DEFAULT 'default',
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `AppId_ClusterName_NamespaceName` (`AppId`(191),`ClusterName`(191),`NamespaceName`(191)),
                KEY `DataChange_LastTime` (`DataChange_LastTime`),
                KEY `IX_NamespaceName` (`NamespaceName`(191))
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `NamespaceLock` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `NamespaceId` int unsigned NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                PRIMARY KEY (`Id`),
                UNIQUE KEY `IX_NamespaceId` (`NamespaceId`),
                KEY `DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `Release` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `ReleaseKey` varchar(64) NOT NULL DEFAULT '',
                `Name` varchar(64) NOT NULL DEFAULT 'default',
                `Comment` varchar(256) DEFAULT NULL,
                `AppId` varchar(500) NOT NULL DEFAULT 'default',
                `ClusterName` varchar(500) NOT NULL DEFAULT 'default',
                `NamespaceName` varchar(500) NOT NULL DEFAULT 'default',
                `Configurations` longtext NOT NULL,
                `IsAbandoned` bit(1) NOT NULL DEFAULT b'0',
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `AppId_ClusterName_GroupName` (`AppId`(191),`ClusterName`(191),`NamespaceName`(191)),
                KEY `DataChange_LastTime` (`DataChange_LastTime`),
                UNIQUE KEY `UK_ReleaseKey_DeletedAt` (`ReleaseKey`,`DeletedAt`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `ReleaseHistory` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `AppId` varchar(64) NOT NULL DEFAULT 'default',
                `ClusterName` varchar(32) NOT NULL DEFAULT 'default',
                `NamespaceName` varchar(32) NOT NULL DEFAULT 'default',
                `BranchName` varchar(32) NOT NULL DEFAULT 'default',
                `ReleaseId` int unsigned NOT NULL DEFAULT 0,
                `PreviousReleaseId` int unsigned NOT NULL DEFAULT 0,
                `Operation` tinyint NOT NULL DEFAULT 0,
                `OperationContext` longtext NOT NULL,
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `IX_Namespace` (`AppId`,`ClusterName`,`NamespaceName`,`BranchName`),
                KEY `IX_ReleaseId` (`ReleaseId`),
                KEY `IX_DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `ReleaseMessage` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `Message` varchar(1024) NOT NULL DEFAULT '',
                `DataChange_LastTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `DataChange_LastTime` (`DataChange_LastTime`),
                KEY `IX_Message` (`Message`(191))
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `ServerConfig` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `Key` varchar(64) NOT NULL DEFAULT 'default',
                `Cluster` varchar(32) NOT NULL DEFAULT 'default',
                `Value` varchar(2048) NOT NULL DEFAULT 'default',
                `Comment` varchar(1024) DEFAULT '',
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `IX_Key` (`Key`),
                KEY `DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `AccessKey` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `AppId` varchar(500) NOT NULL DEFAULT 'default',
                `Secret` varchar(128) NOT NULL DEFAULT '',
                `IsEnabled` bit(1) NOT NULL DEFAULT b'0',
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `ServiceRegistry` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `ServiceName` varchar(64) NOT NULL,
                `Uri` varchar(64) NOT NULL,
                `Cluster` varchar(64) NOT NULL,
                `Metadata` varchar(1024) NOT NULL DEFAULT '{}',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                UNIQUE KEY `IX_UNIQUE_KEY` (`ServiceName`,`Uri`),
                KEY `IX_DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              -- ServerConfig seed (idempotent)
              INSERT IGNORE INTO `ServerConfig` (`Key`, `Cluster`, `Value`, `Comment`)
              VALUES
                ('eureka.service.url','default','http://eureka-server.zenalpha.svc.cluster.local:8761/eureka/','Eureka URL'),
                ('namespace.lock.switch','default','false','Namespace lock'),
                ('item.value.length.limit','default','20000','Item value length limit'),
                ('config-service.cache.enabled','default','false','Config cache');
              SQL
              echo "ConfigDB schema ready."

              echo "=== Phase 3: Import PortalDB schema ==="
              mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASS" ApolloPortalDB <<'SQL'
              CREATE TABLE IF NOT EXISTS `App` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `AppId` varchar(500) NOT NULL DEFAULT 'default',
                `Name` varchar(500) NOT NULL DEFAULT 'default',
                `OrgId` varchar(32) NOT NULL DEFAULT 'default',
                `OrgName` varchar(64) NOT NULL DEFAULT 'default',
                `OwnerName` varchar(500) NOT NULL DEFAULT 'default',
                `OwnerEmail` varchar(500) NOT NULL DEFAULT 'default',
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `AppId` (`AppId`(191)),
                KEY `DataChange_LastTime` (`DataChange_LastTime`),
                KEY `IX_Name` (`Name`(191))
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `AppNamespace` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `Name` varchar(32) NOT NULL DEFAULT '',
                `AppId` varchar(64) NOT NULL DEFAULT '',
                `Format` varchar(32) NOT NULL DEFAULT 'properties',
                `IsPublic` bit(1) NOT NULL DEFAULT b'0',
                `Comment` varchar(64) NOT NULL DEFAULT '',
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `IX_AppId` (`AppId`),
                KEY `Name_AppId` (`Name`,`AppId`),
                KEY `DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `Authorities` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `Username` varchar(64) NOT NULL,
                `Authority` varchar(50) NOT NULL,
                PRIMARY KEY (`Id`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `Consumer` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `AppId` varchar(500) NOT NULL DEFAULT 'default',
                `Name` varchar(500) NOT NULL DEFAULT 'default',
                `OrgId` varchar(32) NOT NULL DEFAULT 'default',
                `OrgName` varchar(64) NOT NULL DEFAULT 'default',
                `OwnerName` varchar(500) NOT NULL DEFAULT 'default',
                `OwnerEmail` varchar(500) NOT NULL DEFAULT 'default',
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `ConsumerAudit` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `ConsumerId` int unsigned DEFAULT NULL,
                `Uri` varchar(1024) NOT NULL DEFAULT '',
                `Method` varchar(16) NOT NULL DEFAULT '',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `IX_DataChange_LastTime` (`DataChange_LastTime`),
                KEY `IX_ConsumerId` (`ConsumerId`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `ConsumerRole` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `ConsumerId` int unsigned DEFAULT NULL,
                `RoleId` int unsigned DEFAULT NULL,
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `IX_DataChange_LastTime` (`DataChange_LastTime`),
                KEY `IX_RoleId` (`RoleId`),
                KEY `IX_ConsumerId` (`ConsumerId`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `ConsumerToken` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `ConsumerId` int unsigned DEFAULT NULL,
                `Token` varchar(128) NOT NULL DEFAULT '',
                `Expires` datetime NOT NULL DEFAULT '2099-01-01 00:00:00',
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                UNIQUE KEY `IX_Token` (`Token`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `Favorite` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `UserId` varchar(32) NOT NULL DEFAULT 'default',
                `AppId` varchar(500) NOT NULL DEFAULT 'default',
                `Position` int NOT NULL DEFAULT 10000,
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `AppId` (`AppId`(191)),
                KEY `IX_UserId` (`UserId`),
                KEY `DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `Permission` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `PermissionType` varchar(32) NOT NULL DEFAULT '',
                `TargetId` varchar(256) NOT NULL DEFAULT '',
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `IX_TargetId_PermissionType` (`TargetId`(191),`PermissionType`),
                KEY `IX_DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `Role` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `RoleName` varchar(256) NOT NULL DEFAULT '',
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `IX_RoleName` (`RoleName`(191)),
                KEY `IX_DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `RolePermission` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `RoleId` int unsigned DEFAULT NULL,
                `PermissionId` int unsigned DEFAULT NULL,
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `IX_DataChange_LastTime` (`DataChange_LastTime`),
                KEY `IX_RoleId` (`RoleId`),
                KEY `IX_PermissionId` (`PermissionId`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `ServerConfig` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `Key` varchar(64) NOT NULL DEFAULT 'default',
                `Value` varchar(2048) NOT NULL DEFAULT 'default',
                `Comment` varchar(1024) DEFAULT '',
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `IX_Key` (`Key`),
                KEY `DataChange_LastTime` (`DataChange_LastTime`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `UserRole` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `UserId` varchar(128) NOT NULL DEFAULT '',
                `RoleId` int unsigned DEFAULT NULL,
                `IsDeleted` bit(1) NOT NULL DEFAULT b'0',
                `DeletedAt` bigint NOT NULL DEFAULT 0,
                `DataChange_CreatedBy` varchar(64) NOT NULL DEFAULT 'default',
                `DataChange_CreatedTime` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                `DataChange_LastModifiedBy` varchar(64) DEFAULT '',
                `DataChange_LastTime` timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                PRIMARY KEY (`Id`),
                KEY `IX_DataChange_LastTime` (`DataChange_LastTime`),
                KEY `IX_RoleId` (`RoleId`),
                KEY `IX_UserId` (`UserId`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `Users` (
                `Id` int unsigned NOT NULL AUTO_INCREMENT,
                `Username` varchar(64) NOT NULL DEFAULT 'default',
                `Password` varchar(512) NOT NULL DEFAULT 'default',
                `UserDisplayName` varchar(512) NOT NULL DEFAULT 'default',
                `Email` varchar(64) NOT NULL DEFAULT 'default',
                `Enabled` tinyint DEFAULT NULL,
                PRIMARY KEY (`Id`),
                UNIQUE KEY `UK_Username` (`Username`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS `SPRING_SESSION` (
                `PRIMARY_ID` char(36) NOT NULL,
                `SESSION_ID` char(36) NOT NULL,
                `CREATION_TIME` bigint NOT NULL,
                `LAST_ACCESS_TIME` bigint NOT NULL,
                `MAX_INACTIVE_INTERVAL` int NOT NULL,
                `EXPIRY_TIME` bigint NOT NULL,
                `PRINCIPAL_NAME` varchar(100) DEFAULT NULL,
                PRIMARY KEY (`PRIMARY_ID`),
                UNIQUE KEY `SPRING_SESSION_IX1` (`SESSION_ID`),
                KEY `SPRING_SESSION_IX2` (`EXPIRY_TIME`),
                KEY `SPRING_SESSION_IX3` (`PRINCIPAL_NAME`)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 ROW_FORMAT=DYNAMIC;

              CREATE TABLE IF NOT EXISTS `SPRING_SESSION_ATTRIBUTES` (
                `SESSION_PRIMARY_ID` char(36) NOT NULL,
                `ATTRIBUTE_NAME` varchar(200) NOT NULL,
                `ATTRIBUTE_BYTES` blob NOT NULL,
                PRIMARY KEY (`SESSION_PRIMARY_ID`,`ATTRIBUTE_NAME`),
                CONSTRAINT `SPRING_SESSION_ATTRIBUTES_FK` FOREIGN KEY (`SESSION_PRIMARY_ID`) REFERENCES `SPRING_SESSION` (`PRIMARY_ID`) ON DELETE CASCADE
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 ROW_FORMAT=DYNAMIC;

