apiVersion: apps/v1
kind: Deployment
metadata:
  name: apollo-configservice
  namespace: zenalpha
  labels:
    app: apollo-configservice
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apollo-configservice
  template:
    metadata:
      labels:
        app: apollo-configservice
        version: v2
    spec:
      containers:
        - name: apollo-configservice
          image: apolloconfig/apollo-configservice:2.1.0
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: zenalpha-db-secret
                  key: host
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://$(DB_HOST):3306/ApolloConfigDB?useSSL=false&characterEncoding=utf8
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: zenalpha-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenalpha-db-secret
                  key: password
            - name: EUREKA_INSTANCE_HOME_PAGE_URL
              value: http://apollo-configservice.zenalpha.svc.cluster.local:8080
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
---
