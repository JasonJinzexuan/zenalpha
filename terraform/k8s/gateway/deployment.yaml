apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: zenalpha
  labels:
    app: gateway
    version: v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        version: v2
    spec:
      containers:
        - name: gateway
          image: ${ECR_REGISTRY}/zenalpha/gateway:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              value: http://eureka-server.zenalpha.svc.cluster.local:8761/eureka/
            - name: APOLLO_META
              value: http://apollo-configservice.zenalpha.svc.cluster.local:8080
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
