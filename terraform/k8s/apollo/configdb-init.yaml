apiVersion: batch/v1
kind: Job
metadata:
  name: apollo-db-init
  namespace: zenalpha
  labels:
    app: apollo
    component: db-init
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: apollo
        component: db-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: apollo-db-init
          image: mysql:8.0
          command:
            - /bin/sh
            - -c
            - |
              mysql -h ${DB_HOST} -u ${DB_USER} -p${DB_PASSWORD} <<EOF
              CREATE DATABASE IF NOT EXISTS ApolloConfigDB DEFAULT CHARACTER SET utf8mb4;
              CREATE DATABASE IF NOT EXISTS ApolloPortalDB DEFAULT CHARACTER SET utf8mb4;
              EOF
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: zenalpha-db-secret
                  key: host
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: zenalpha-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenalpha-db-secret
                  key: password
