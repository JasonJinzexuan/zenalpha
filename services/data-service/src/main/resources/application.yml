server:
  port: 8083

spring:
  application:
    name: data-service
  datasource:
    url: jdbc:mysql://localhost:3306/zenalpha_data?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: zenalpha
    password: ${MYSQL_PASSWORD:zenalpha}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

polygon:
  api-key: ${POLYGON_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
